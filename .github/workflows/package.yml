# M4 packaging CI — proves the two targets the macOS dev machine cannot:
# the Linux AppImage and the Nix flake, plus a macOS dmg leg (crane path,
# no docker daemon on macOS runners).
#
# Runs on pushes to ci/m4 (the M4 CI iteration branch) and manual dispatch.

name: package

on:
  push:
    branches: [ci/m4]
  workflow_dispatch:

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux AppImage: runtime bundle (linux builder) + tauri appimage + headless
  # smoke against the artifact's own extracted resources.
  # ---------------------------------------------------------------------------
  linux-appimage:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri v2 + bundle-builder system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev libssl-dev build-essential curl wget file \
            patchelf squashfs-tools xvfb libfuse2t64

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: linux-appimage

      - name: Cache runtime-bundle components (dist/)
        uses: actions/cache@v4
        with:
          path: dist
          key: linux-runtime-bundle-${{ hashFiles('scripts/build-runtime-bundle-linux.sh') }}

      - name: Install tauri-cli
        uses: cargo-bins/cargo-binstall@802977a265b5f8825ebef2176db5f5f3edc82280 # main 2026-07
      - run: cargo binstall -y tauri-cli@2.11.4 || cargo install tauri-cli --version 2.11.4 --locked

      - name: Build the Linux penpot-runtime bundle (docker path + proofs)
        run: bash scripts/build-runtime-bundle-linux.sh

      - name: Build the AppImage
        run: |
          # tauri-build re-copies resources next to the release binary and
          # cannot overwrite the bundle's read-only files — pre-clear (same
          # fix as scripts/build-dmg.sh on macOS).
          rm -rf target/release/penpot-runtime
          cd apps/desktop
          CI=true NO_STRIP=true cargo tauri build --bundles appimage --config tauri.bundle.conf.json
          ls -la ../../target/release/bundle/appimage/

      - name: Build headless + watchdog (release, incremental after tauri build)
        run: cargo build --release -p penpot-desktop --bin headless -p supervisor --bin penpot-watchdog

      - name: Headless smoke against the AppImage's own extracted resources
        run: |
          set -euxo pipefail
          cd target/release/bundle/appimage
          APPIMAGE="$(ls *.AppImage | head -1)"
          ./"$APPIMAGE" --appimage-extract >/dev/null
          BUNDLE="$(find "$PWD/squashfs-root" -type d -name penpot-runtime | head -1)"
          test -n "$BUNDLE"
          cd "$GITHUB_WORKSPACE"
          bash scripts/ci-bundle-smoke.sh "$BUNDLE" target/release/headless

      # Best-effort: a short tray-less GUI boot under xvfb. Informational
      # only — tray/webkit behavior on a bare X server is not an M4 exit
      # criterion; the headless smoke above is the gating check.
      - name: GUI boot check under xvfb (best-effort)
        continue-on-error: true
        timeout-minutes: 8
        run: |
          set -x
          APPDIR="$(pwd)/target/release/bundle/appimage/squashfs-root"
          DATA="$(mktemp -d)"
          PENPOT_LOCAL_DATA_DIR="$DATA" xvfb-run -a "$APPDIR/AppRun" > gui.log 2>&1 &
          GUI_PID=$!
          OK=0
          for _ in $(seq 1 60); do
            if curl -sSf http://localhost:8686/ 2>/dev/null | grep -qi penpot; then OK=1; break; fi
            kill -0 "$GUI_PID" 2>/dev/null || break
            sleep 3
          done
          kill -TERM "$GUI_PID" 2>/dev/null || true
          sleep 5; kill -9 "$GUI_PID" 2>/dev/null || true
          tail -40 gui.log || true
          [ "$OK" -eq 1 ] && echo "GUI boot: SPA served through the proxy under xvfb" || { echo "GUI boot under xvfb did not serve the SPA (informational)"; exit 1; }

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: penpot-local-appimage
          path: target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Nix flake: exactly the flake author's validation sequence (see nix/README.md).
  # flake.lock is committed — do NOT re-lock here.
  # ---------------------------------------------------------------------------
  nix:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space (nix store + webkitgtk closure need room)
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache/CodeQL /usr/share/dotnet
          df -h /

      - uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main 2026-07

      - name: (1) Pure evaluation on all systems
        run: nix flake check --no-build --all-systems

      - name: (2) Build packages.headless (first actual compilation)
        run: |
          nix build .#headless -L
          test -x result/bin/headless
          test -x result/bin/penpot-watchdog

      - name: (3) Dev shell usability (cargo check inside nix develop)
        run: nix develop -c cargo check --workspace

      - name: (4) Full flake check (builds checks.headless, mostly cached)
        run: nix flake check -L
      # Step (5) `nix develop -c cargo test --workspace` is the flake author's
      # optional extra (needs network for the embedded-postgres download and
      # free localhost ports). The same suite already runs green in dev mode
      # on the macOS machine; skipped here to keep CI iterations fast.

  # ---------------------------------------------------------------------------
  # macOS dmg: crane path (no docker on macOS runners) + build-dmg.sh + the
  # headless subset of the artifact test against the dmg's own .app resources.
  # ---------------------------------------------------------------------------
  macos-dmg:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install homebrew deps (JDK 26, valkey, ImageMagick)
        run: |
          brew install --quiet openjdk valkey imagemagick
          /opt/homebrew/opt/openjdk/bin/java --version

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: macos-dmg

      - name: Cache runtime-bundle components (dist/)
        uses: actions/cache@v4
        with:
          path: dist
          key: macos-runtime-bundle-${{ hashFiles('scripts/build-runtime-bundle.sh') }}

      - name: Install tauri-cli
        uses: cargo-bins/cargo-binstall@802977a265b5f8825ebef2176db5f5f3edc82280 # main 2026-07
      - run: cargo binstall -y tauri-cli@2.11.4 || cargo install tauri-cli --version 2.11.4 --locked

      - name: Build the macOS penpot-runtime bundle (crane path + proofs)
        run: bash scripts/build-runtime-bundle.sh --no-docker

      - name: Build the dmg
        run: bash scripts/build-dmg.sh --skip-bundle

      - name: Build headless + watchdog (release, incremental)
        run: cargo build --release -p penpot-desktop --bin headless -p supervisor --bin penpot-watchdog

      - name: Headless smoke against the dmg's own .app resources
        run: |
          set -euxo pipefail
          DMG="$(ls target/release/bundle/dmg/*.dmg | head -1)"
          MOUNT="$(mktemp -d)/mnt"
          hdiutil attach -nobrowse -readonly -mountpoint "$MOUNT" "$DMG" >/dev/null
          INSTALL="$(mktemp -d)"
          ditto "$MOUNT"/*.app "$INSTALL/Penpot Local.app"
          hdiutil detach "$MOUNT" -quiet || true
          bash scripts/ci-bundle-smoke.sh \
            "$INSTALL/Penpot Local.app/Contents/Resources/penpot-runtime" \
            target/release/headless

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: penpot-local-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error
