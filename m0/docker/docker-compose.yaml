# M0 spike stack — upstream Penpot, pinned. Learning rig only (see PLAN.md M0);
# the real app embeds these services natively.
#
# Ports on the host:
#   9001 -> frontend nginx (normal UI, baseline for how assets SHOULD work)
#   6060 -> backend directly (RPC probing + raw X-Accel header observation, risk 6)
name: penpot-m0

volumes:
  postgres_data:
  assets_data:

services:
  penpot-frontend:
    image: penpotapp/frontend:2.16.2
    ports:
      - "9001:8080"
    volumes:
      - assets_data:/opt/data/assets
    depends_on:
      - penpot-backend
    environment:
      PENPOT_FLAGS: enable-access-tokens disable-email-verification disable-secure-session-cookies disable-onboarding

  penpot-backend:
    image: penpotapp/backend:2.16.2
    ports:
      - "6060:6060"
    volumes:
      - assets_data:/opt/data/assets
    depends_on:
      penpot-postgres:
        condition: service_healthy
      penpot-valkey:
        condition: service_healthy
    environment:
      # enable-prepl-server is required by the bundled manage.py (user provisioning)
      PENPOT_FLAGS: enable-access-tokens disable-email-verification disable-secure-session-cookies disable-onboarding enable-prepl-server
      # Pinned so sessions/access-tokens survive backend restarts (otherwise an
      # autogenerated key is used and rotates on every restart). Dev-only value.
      PENPOT_SECRET_KEY: m0-spike-dev-secret-key-not-for-production
      PENPOT_PUBLIC_URI: http://localhost:9001
      PENPOT_DATABASE_URI: postgresql://penpot-postgres/penpot
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_DATABASE_PASSWORD: penpot
      PENPOT_REDIS_URI: redis://penpot-valkey/0
      PENPOT_OBJECTS_STORAGE_BACKEND: fs
      PENPOT_OBJECTS_STORAGE_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"

  penpot-exporter:
    # Required: the frontend nginx.conf declares an upstream "penpot-exporter"
    # and refuses to start if the hostname does not resolve.
    image: penpotapp/exporter:2.16.2
    depends_on:
      - penpot-backend
    environment:
      PENPOT_PUBLIC_URI: http://penpot-frontend:8080
      PENPOT_REDIS_URI: redis://penpot-valkey/0
      # The exporter refuses to start without a secret key; must match the backend's.
      PENPOT_SECRET_KEY: m0-spike-dev-secret-key-not-for-production

  penpot-postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 2s
      timeout: 5s
      retries: 30
    environment:
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_DB: penpot
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: penpot

  penpot-valkey:
    image: valkey/valkey:8.1
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30
